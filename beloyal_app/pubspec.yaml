name: besahub_app
description: "BesaHub — Premium loyalty & rewards platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1

  # Routing
  go_router: ^17.1.0

  # Networking
  dio: ^5.9.1

  # UI / Animations
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.1
  confetti: ^0.8.0
  image_picker: ^1.0.7

  # Utilities
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  app_links: ^7.0.0
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
